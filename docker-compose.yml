version: '3.8'

services:
  postgres:
    container_name: forum-api-postgres
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: forum-db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
  cache:
    container_name: forum-api-cache
    image: redis:latest
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/var/lib/redis/data
volumes:
  postgres_data:
  redis_data:
